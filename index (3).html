<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Moving Car</title>
    <style>
        .road {
            width: 100%;
            height: 300px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }
        .car {
            position: absolute;
            bottom: 50px;
            left: -300px;
            animation: drive 8s linear infinite;
            width: 200px;
            height: auto;
        }
        @keyframes drive {
            0% { left: -300px; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div class="road">
        < img src="car.jpeg" alt="Moving Car" class="car">
    </div>
</body>
</html>
