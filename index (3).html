<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Moving Car</title>
    <style>
        /* 动画容器，控制小汽车的活动范围 */
        .road {
            width: 100%;
            height: 300px;
            background: #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        /* 小汽车图片样式 + 动画 */
        .car {
            position: absolute;
            bottom: 50px;
            left: -300px; /* 初始位置：屏幕左侧外面 */
            /* 动画设置：8秒匀速循环，从左开到右 */
            animation: drive 8s linear infinite;
            /* 调整图片大小，根据你的car.jpeg改 */
            width: 200px;
            height: auto;
        }

        /* 小汽车移动的动画关键帧 */
        @keyframes drive {
            0% {
                left: -300px; /* 起点：屏幕外左侧 */
            }
            100% {
                left: 100%; /* 终点：屏幕外右侧 */
            }
        }
    </style>
</head>
<body>
    <div class="road">
        <!-- 完全匹配你带点的文件名 car.jpeg -->
        < img src="car.jpeg" alt="Moving Car" class="car">
    </div>
</body>
</html>
